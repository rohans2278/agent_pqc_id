# Postgres + the two backend services (built once, shared image).
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pqc
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pqc"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    image: pqc-agent-id-backend
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    env_file: .env
    environment:
      # Reach the MCP server over the compose network, not localhost.
      MCP_SERVER_URL: http://mcp:8001/mcp
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      mcp:
        condition: service_started

  mcp:
    # Reuses the image built by `api` (no second build).
    image: pqc-agent-id-backend
    command: python mcp_server.py
    env_file: .env
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
